<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* macroTask、microTask - 宏任务、微任务
      1、宏任务：setTimeout、setInterval、Ajax、DOM事件
      2、微任务：Promise、async/await
      3、微任务执行时机比宏任务早
    */

    console.log(1) // step1-同步
    setTimeout(() => {
      console.log(2) // step4-宏任务
    })
    Promise.resolve().then(() => {
      console.log(3) //step3-微任务
    })
    console.log(4) //step2-同步
   //结果： 1、4、3、2

   async function fn() {
    return 100
   }
   console.log(fn()) // Promise {<fulfilled>: 100}
  </script>
</body>
</html>
