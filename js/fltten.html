<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    /* 减少嵌套一级
       输入：[1,2,[3,[4]],5]
       输出：[1,2,,3,[4],5]
       思路：定义res空数组，遍历arr，如果item为数组则遍历push进res，不为数组直接push进res
    */

    function flatten(arr = []){
      const res = []
      arr.forEach(item => {
        if(Array.isArray(item)){
          item.forEach(i => res.push(i))
        }else{
          res.push(item)
        }
      })
      return res
    }

    const arr = [1,2,[3,[4]],5]
    console.log(flatten(arr)) // [1,2,,3,[4],5]

    /* 方法2：使用concat
      [1,2].concat(3) , [1,2,3]
      [1,2].concat([3,4]),[1,2,3,4]
    */
   function flatten2(arr =[]){
    let res = []
    arr.forEach(item => {
      // res = res.concat(item)
      if(Array.isArray(item)){
        res = res.concat(flatten2(item))
      }else{
        res = res.concat(item)
      }
    })
    return res
   }

   const arr2 = [1,2,[3,[[4,5,[6]]]],7]
   console.log(flatten2(arr2)) // [1,2,,3,4,5,6,7]

  </script>
</body>
</html>
